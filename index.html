
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --c1:#6C63FF;--c2:#FF6584;--c3:#43E8A4;--c4:#FFD166;--c5:#4CC9F0;
  --bg:#0E0E16;--surf:#16161F;--surf2:#1E1E2E;--surf3:#252538;
  --txt:#F0EFF8;--txt2:#9B98B8;--txt3:#5A5878;
  --r:10px;--rl:14px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt)}
.app{padding:1.5rem 0;min-height:100vh}
.hdr{display:flex;align-items:center;gap:14px;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid rgba(108,99,255,.2)}
.logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--c1),var(--c2));display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 20px rgba(108,99,255,.4)}
.logo svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2}
.htitle{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;color:var(--txt);letter-spacing:-.01em}
.hsub{font-size:11px;color:var(--txt2);margin-top:3px}
.hbadges{display:flex;gap:6px;margin-left:auto}
.hbadge{font-size:10px;padding:3px 10px;border-radius:20px;border:1px solid rgba(108,99,255,.4);color:var(--c1);font-family:'Space Mono',monospace;background:rgba(108,99,255,.08)}
.tabs{display:flex;gap:6px;margin-bottom:1.75rem;background:var(--surf);border-radius:var(--rl);padding:5px;border:1px solid rgba(255,255,255,.06)}
.tab{flex:1;padding:8px 10px;font-size:12px;font-weight:500;cursor:pointer;color:var(--txt2);border-radius:9px;background:none;border:none;transition:all .2s;text-align:center;font-family:'DM Sans',sans-serif}
.tab.on{background:linear-gradient(135deg,var(--c1),rgba(76,201,240,.8));color:#fff;box-shadow:0 2px 12px rgba(108,99,255,.4)}
.drop{border:1.5px dashed rgba(108,99,255,.35);border-radius:var(--rl);padding:2.5rem 1.5rem;text-align:center;cursor:pointer;position:relative;transition:all .25s;margin-bottom:1rem;background:var(--surf);overflow:hidden}
.drop::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(108,99,255,.08) 0%,transparent 70%);pointer-events:none}
.drop:hover,.drop.drag{border-color:var(--c1);background:rgba(108,99,255,.08)}
.drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,rgba(108,99,255,.2),rgba(76,201,240,.2));border:1px solid rgba(108,99,255,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.drop-icon svg{width:22px;height:22px;stroke:var(--c1);fill:none;stroke-width:1.5}
.drop h3{font-size:15px;font-weight:600;color:var(--txt);margin-bottom:6px}
.drop p{font-size:12px;color:var(--txt2)}
.demo-row{display:flex;gap:8px;justify-content:center;margin-top:18px;flex-wrap:wrap}
.dbtn{font-size:11px;padding:6px 14px;border-radius:20px;border:none;cursor:pointer;transition:all .2s;font-weight:600;font-family:'DM Sans',sans-serif;letter-spacing:.01em}
.dbtn:nth-child(1){background:linear-gradient(135deg,var(--c1),var(--c2));color:#fff;box-shadow:0 3px 12px rgba(108,99,255,.4)}
.dbtn:nth-child(2){background:linear-gradient(135deg,var(--c3),var(--c5));color:#0E0E16;box-shadow:0 3px 12px rgba(67,232,164,.35)}
.dbtn:nth-child(3){background:linear-gradient(135deg,var(--c4),var(--c2));color:#0E0E16;box-shadow:0 3px 12px rgba(255,209,102,.35)}
.dbtn:hover{transform:translateY(-1px);filter:brightness(1.1)}
.sg{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:2rem}
.sc{border-radius:var(--rl);padding:16px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.sc.blue{background:linear-gradient(135deg,rgba(108,99,255,.18),rgba(76,201,240,.08));border-color:rgba(108,99,255,.3)}
.sc.green{background:linear-gradient(135deg,rgba(67,232,164,.15),rgba(76,201,240,.06));border-color:rgba(67,232,164,.25)}
.sc.pink{background:linear-gradient(135deg,rgba(255,101,132,.15),rgba(255,209,102,.06));border-color:rgba(255,101,132,.25)}
.sc.purple{background:linear-gradient(135deg,rgba(76,201,240,.15),rgba(108,99,255,.06));border-color:rgba(76,201,240,.25)}
.sc .lbl{font-size:10px;color:var(--txt2);margin-bottom:8px;font-weight:500;text-transform:uppercase;letter-spacing:.08em}
.sc .val{font-size:26px;font-weight:700;font-family:'Space Mono',monospace;letter-spacing:-.02em}
.sc.blue .val{color:var(--c1)}.sc.green .val{color:var(--c3)}.sc.pink .val{color:var(--c2)}.sc.purple .val{color:var(--c5)}
.sc .sub{font-size:11px;color:var(--txt3);margin-top:4px}
.cg{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:2rem}
.cc{background:var(--surf);border:1px solid rgba(255,255,255,.07);border-radius:var(--rl);padding:16px;cursor:pointer;transition:all .2s}
.cc:hover{border-color:rgba(108,99,255,.5);background:rgba(108,99,255,.07);transform:translateY(-1px)}
.cc-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.tbadge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700;font-family:'Space Mono',monospace;letter-spacing:.02em}
.tn{background:rgba(108,99,255,.2);color:#A8A4FF;border:1px solid rgba(108,99,255,.3)}
.tt{background:rgba(67,232,164,.15);color:#43E8A4;border:1px solid rgba(67,232,164,.25)}
.td{background:rgba(255,209,102,.15);color:#FFD166;border:1px solid rgba(255,209,102,.25)}
.cname{font-size:13px;font-weight:600;color:var(--txt)}
.mbr{display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:5px}
.mbl{color:var(--txt2);width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.mbt{flex:1;height:5px;background:var(--surf3);border-radius:3px;overflow:hidden}
.mbf{height:100%;border-radius:3px}
.mbv{color:var(--txt3);width:28px;text-align:right;flex-shrink:0;font-family:'Space Mono',monospace;font-size:10px}
.cst{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06)}
.cs{font-size:11px}.cs span{color:var(--txt3)}.cs strong{color:var(--txt);font-weight:600;font-family:'Space Mono',monospace}
.nr{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06);font-size:11px}
.nt{flex:1;height:4px;background:var(--surf3);border-radius:2px;overflow:hidden}
.nf{height:100%;background:linear-gradient(90deg,var(--c2),#FF8FA3);border-radius:2px}
.nl{color:var(--c2);white-space:nowrap;font-weight:600;font-size:10px;font-family:'Space Mono',monospace}
.iqbox{border:1px solid rgba(255,209,102,.25);border-radius:var(--rl);padding:16px;margin-bottom:2rem;background:rgba(255,209,102,.06)}
.iqhdr{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.iqhdr span{font-size:13px;font-weight:600;color:var(--c4)}
.iq{display:flex;align-items:flex-start;gap:10px;font-size:12px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);color:var(--txt2)}
.iq:last-child{border-bottom:none}
.iqdot{width:5px;height:5px;border-radius:50%;background:var(--c4);margin-top:5px;flex-shrink:0}
.btns-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.cbtn{flex:1;padding:11px;border-radius:var(--r);border:none;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;font-weight:600;font-family:'DM Sans',sans-serif;min-width:140px}
.cbtn.violet{background:linear-gradient(135deg,var(--c1),var(--c5));color:#fff;box-shadow:0 4px 16px rgba(108,99,255,.4)}
.cbtn.rose{background:linear-gradient(135deg,var(--c2),var(--c4));color:#0E0E16;box-shadow:0 4px 16px rgba(255,101,132,.3)}
.cbtn:hover{transform:translateY(-1px);filter:brightness(1.1)}
.dist-bars{display:flex;align-items:flex-end;gap:2px;height:48px}
.dist-bar{flex:1;border-radius:2px 2px 0 0;min-height:3px;transition:opacity .15s}
.dist-bar:hover{opacity:.65}
.dist-ax{display:flex;justify-content:space-between;font-size:10px;color:var(--txt3);margin-top:4px;font-family:'Space Mono',monospace}
.corr-grid{display:grid;gap:8px;margin-bottom:2rem}
.corr-row{display:flex;align-items:center;gap:10px;font-size:12px;padding:12px 14px;background:var(--surf);border:1px solid rgba(255,255,255,.06);border-radius:var(--r);transition:border-color .15s}
.corr-row:hover{border-color:rgba(108,99,255,.35)}
.corr-pair{width:160px;color:var(--txt2);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}
.corr-track{flex:1;height:6px;background:var(--surf3);border-radius:3px;overflow:hidden}
.corr-fill{height:100%;border-radius:3px}
.corr-val{width:36px;text-align:right;font-weight:700;flex-shrink:0;font-family:'Space Mono',monospace;font-size:12px}
.str-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
.pv-wrap{overflow-x:auto;margin-bottom:2rem;border:1px solid rgba(255,255,255,.07);border-radius:var(--rl)}
.pv-table{width:100%;border-collapse:collapse;font-size:11px}
.pv-table th{text-align:left;padding:10px 13px;border-bottom:1px solid rgba(255,255,255,.08);color:var(--txt3);font-weight:600;background:var(--surf2);font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.06em}
.pv-table td{padding:8px 13px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--txt);font-family:'Space Mono',monospace;font-size:11px}
.pv-table tr:last-child td{border-bottom:none}
.pv-table tr:hover td{background:rgba(108,99,255,.06)}
.search-row{display:flex;gap:8px;margin-bottom:12px}
.sinput{flex:1;font-size:13px;padding:9px 13px;border-radius:var(--r);border:1px solid rgba(255,255,255,.1);background:var(--surf);color:var(--txt);font-family:'DM Sans',sans-serif;transition:border-color .2s}
.sinput:focus{outline:none;border-color:var(--c1);background:rgba(108,99,255,.07)}
.sinput::placeholder{color:var(--txt3)}
.ssel{font-size:12px;padding:9px 13px;border-radius:var(--r);border:1px solid rgba(255,255,255,.1);background:var(--surf);color:var(--txt);font-family:'DM Sans',sans-serif}
.hidden{display:none}
.score-ring{display:flex;align-items:center;gap:20px;padding:18px 20px;background:var(--surf);border:1px solid rgba(255,255,255,.07);border-radius:var(--rl);margin-bottom:2rem}
.ring-circle{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;flex-shrink:0;border:2.5px solid;font-family:'Space Mono',monospace}
.ring-info h3{font-size:14px;font-weight:600;color:var(--txt);margin-bottom:5px}
.ring-info p{font-size:12px;color:var(--txt2);line-height:1.5}
.null-pill{display:inline-block;font-size:10px;padding:1px 7px;border-radius:10px;background:rgba(255,101,132,.15);color:var(--c2);font-weight:600;border:1px solid rgba(255,101,132,.2);font-family:'Space Mono',monospace}
.parse-status{font-size:11px;color:var(--txt3);margin-bottom:10px;min-height:16px;font-family:'Space Mono',monospace}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-lbl::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}
.empty-corr{font-size:13px;color:var(--txt2);padding:28px;text-align:center;background:var(--surf);border-radius:var(--rl);border:1px solid rgba(255,255,255,.06)}
</style>
<h2 style="position:absolute;opacity:0;pointer-events:none">Smart Data Profiler — upload a CSV to explore stats, correlations, quality score, and preview</h2>
<div class="app">
<div class="hdr">
  <div class="logo"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
  <div>
    <div class="htitle">Data Profiler</div>
    <div class="hsub">Column stats · Correlations · Quality · Preview</div>
  </div>
  <div class="hbadges"><span class="hbadge">CSV</span><span class="hbadge">TSV</span></div>
</div>

<div class="drop" id="dropzone">
  <input type="file" accept=".csv,.tsv,.txt" id="fileInput">
  <div class="drop-icon"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
  <h3>Drop your file here</h3>
  <p>CSV or TSV · click anywhere to browse</p>
  <div class="demo-row">
    <button class="dbtn" onclick="loadDemo('sales');event.stopPropagation()">Sales data</button>
    <button class="dbtn" onclick="loadDemo('users');event.stopPropagation()">User signups</button>
    <button class="dbtn" onclick="loadDemo('survey');event.stopPropagation()">Survey results</button>
  </div>
</div>
<div class="parse-status" id="parse-status"></div>

<div id="results" class="hidden">
  <div class="tabs">
    <button class="tab on" onclick="showTab('overview',this)">Overview</button>
    <button class="tab" onclick="showTab('columns',this)">Columns</button>
    <button class="tab" onclick="showTab('correlations',this)">Correlations</button>
    <button class="tab" onclick="showTab('preview',this)">Preview</button>
  </div>

  <div id="tab-overview">
    <div class="sec-lbl">Dataset summary</div>
    <div class="sg" id="statsGrid"></div>
    <div class="sec-lbl">Quality score</div>
    <div class="score-ring" id="scoreRing"></div>
    <div class="sec-lbl">Issues detected</div>
    <div class="iqbox" id="issuesBox"></div>
    <div class="btns-row">
      <button class="cbtn violet" onclick="doAsk()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Ask Claude for analysis ↗</button>
      <button class="cbtn rose" onclick="doML()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>Suggest ML models ↗</button>
    </div>
  </div>

  <div id="tab-columns" class="hidden">
    <div class="search-row">
      <input class="sinput" type="text" id="colSearch" placeholder="Search columns..." oninput="filterCols()">
      <select class="ssel" id="colSort" onchange="filterCols()">
        <option value="name">Name</option>
        <option value="nulls">Most nulls</option>
        <option value="type">Type</option>
      </select>
    </div>
    <div class="cg" id="colsGrid"></div>
  </div>

  <div id="tab-correlations" class="hidden">
    <div class="sec-lbl">Pearson r · numeric columns</div>
    <div class="corr-grid" id="corrGrid"></div>
    <div class="btns-row">
      <button class="cbtn violet" onclick="sendPrompt('Explain the correlations in my dataset and what they might mean ↗')">Explain correlations ↗</button>
    </div>
  </div>

  <div id="tab-preview" class="hidden">
    <div class="search-row">
      <input class="sinput" type="text" id="rowSearch" placeholder="Filter rows..." oninput="filterRows()">
      <select class="ssel" id="previewSort" onchange="renderPreview()"><option value="">Sort by…</option></select>
    </div>
    <div class="pv-wrap"><table class="pv-table" id="pvTable"></table></div>
  </div>
</div>
</div>

<script>
var G={cols:[],rows:[],fname:'',rawRows:[],headers:[],n:0};
const PAL=[
  {bar:'#6C63FF',bg:'rgba(108,99,255,.75)'},
  {bar:'#43E8A4',bg:'rgba(67,232,164,.75)'},
  {bar:'#FF6584',bg:'rgba(255,101,132,.75)'},
  {bar:'#FFD166',bg:'rgba(255,209,102,.75)'},
  {bar:'#4CC9F0',bg:'rgba(76,201,240,.75)'},
  {bar:'#F77F00',bg:'rgba(247,127,0,.75)'}
];

const DEMOS={
  sales:{name:'sales_q1.csv',rawRows:[['revenue','region','order_date','discount','rep_name'],[52000,'North','2025-01-05',10,'Alice'],[8200,'South','2025-01-12',0,'Bob'],[0,'East','2025-01-14',5,'Carol'],[98500,'North','2025-02-01',20,'Alice'],[14000,'West','2025-02-10',0,'Dave'],[3200,'South','2025-02-14','','Bob'],[27000,'East','2025-03-03',50,'Carol'],[450,'North','2025-03-11',0,'Alice'],[18000,'','2025-03-22',8,'Dave'],[62000,'South','','15','Bob'],[5500,'West','2025-03-28',0,'Carol'],[33000,'North','2025-01-30',10,'Alice']]},
  users:{name:'users_may2026.csv',rawRows:[['age','country','signup_date','plan','referral'],[24,'US','2026-01-01','free','google'],[31,'IN','2026-01-03','pro','direct'],[45,'UK','2026-01-05','enterprise','linkedin'],[17,'US','2026-01-08','free','google'],[28,'IN','2026-01-10','free','direct'],[55,'','2026-02-01','pro','email'],[33,'US','2026-02-12','free','google'],[29,'UK','2026-03-01','pro','linkedin'],[41,'US','2026-03-15','enterprise','direct'],[22,'IN','','free','google'],[38,'US','2026-04-01','pro','email'],[,'US','2026-04-10','free','google']]},
  survey:{name:'nps_survey.csv',rawRows:[['nps_score','department','response_date','verbatim','tenure_years'],[9,'Engineering','2026-01-10','Great tools',3],[7,'Sales','2026-01-12','',2],[4,'HR','2026-01-14','Needs work',1],[10,'Finance','2026-02-01','Excellent',5],[6,'Engineering','2026-02-10','',4],[2,'Sales','2026-03-01','Poor',1],[8,'HR','','Good',2],[,'Engineering','2026-03-15','',3],[5,'Finance','2026-04-01','Average',6],[7,'Sales','2026-04-10','',2],[1,'HR','2026-04-15','Very poor',1],[9,'Finance','2026-04-15','',8]]}
};

function loadDemo(k){var d=DEMOS[k];var h=d.rawRows[0];var rows=d.rawRows.slice(1);G.fname=d.name;G.rawRows=rows;profile(d.name,h,rows);}

function parseCSV(text){return text.trim().split(/\r?\n/).map(function(l){var res=[],cur='',inQ=false;for(var i=0;i<l.length;i++){var c=l[i];if(c==='"'){inQ=!inQ;}else if((c===','||c==='\t')&&!inQ){res.push(cur.trim());cur='';}else cur+=c;}res.push(cur.trim());return res;});}

document.getElementById('fileInput').addEventListener('change',function(e){
  var f=e.target.files[0];if(!f)return;
  document.getElementById('parse-status').textContent='Reading '+f.name+' …';
  var r=new FileReader();
  r.onload=function(ev){try{var rows=parseCSV(ev.target.result);if(rows.length<2){document.getElementById('parse-status').textContent='File appears empty.';return;}var h=rows[0],data=rows.slice(1).filter(function(r){return r.some(function(c){return c!=='';});});G.fname=f.name;G.rawRows=data;document.getElementById('parse-status').textContent='✓ '+data.length.toLocaleString()+' rows · '+h.length+' columns';profile(f.name,h,data);}catch(err){document.getElementById('parse-status').textContent='Error: '+err.message;}};
  r.onerror=function(){document.getElementById('parse-status').textContent='Could not read file.';};
  r.readAsText(f);
});

var dz=document.getElementById('dropzone');
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',function(){dz.classList.remove('drag');});
dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('drag');var f=e.dataTransfer.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){var rows=parseCSV(ev.target.result);if(rows.length<2)return;var h=rows[0],data=rows.slice(1).filter(function(r){return r.some(function(c){return c!=='';});});G.fname=f.name;G.rawRows=data;profile(f.name,h,data);};r.readAsText(f);});

function detectType(vals){var filled=vals.filter(function(v){return v!==''&&v!=null;});if(!filled.length)return 'text';var nums=filled.filter(function(v){return !isNaN(Number(v))&&v!=='';});if(nums.length/filled.length>0.7)return 'numeric';var dates=filled.filter(function(v){return !isNaN(Date.parse(v));});if(dates.length/filled.length>0.7)return 'date';return 'text';}

function profile(fname,headers,dataRows){
  var n=dataRows.length;
  var cols=headers.map(function(name,ci){
    var vals=dataRows.map(function(r){return r[ci]!==undefined?String(r[ci]).trim():'';});
    var filled=vals.filter(function(v){return v!==''&&v!=='undefined'&&v!=='null';});
    var nullPct=Math.round((n-filled.length)/n*100);
    var type=detectType(filled);
    if(type==='numeric'){var nums=filled.map(Number).filter(function(v){return !isNaN(v);});var sorted=[].concat(nums).sort(function(a,b){return a-b;});var mean=nums.length?Math.round(nums.reduce(function(s,v){return s+v;},0)/nums.length):0;var median=sorted.length?Math.round(sorted[Math.floor(sorted.length/2)]):0;var min=sorted[0]||0,max=sorted[sorted.length-1]||0;var std=nums.length?Math.round(Math.sqrt(nums.reduce(function(s,v){return s+(v-mean)*(v-mean);},0)/nums.length)):0;var bk=10,step=(max-min)/bk||1,dist=Array(bk).fill(0);nums.forEach(function(v){var b=Math.min(Math.floor((v-min)/step),bk-1);dist[b]++;});return {name,type,nullPct,min:Math.round(min),max:Math.round(max),mean,median,std,dist,vals:nums};}
    var freq={};filled.forEach(function(v){freq[v]=(freq[v]||0)+1;});
    var topVals=Object.entries(freq).sort(function(a,b){return b[1]-a[1];}).slice(0,4).map(function(e){return[e[0],Math.round(e[1]/filled.length*100)];});
    var unique=Object.keys(freq).length;
    if(type==='date'){var dates=filled.map(function(v){return new Date(v);}).filter(function(d){return !isNaN(d);}).sort(function(a,b){return a-b;});return {name,type:'date',nullPct,min:dates[0]?dates[0].toISOString().slice(0,10):'',max:dates[dates.length-1]?dates[dates.length-1].toISOString().slice(0,10):'',unique,topVals};}
    return {name,type:'text',nullPct,topVals,unique};
  });
  G.cols=cols;G.rows=dataRows;G.headers=headers;G.n=n;
  renderAll(fname,cols,dataRows,n);
}

function renderAll(fname,cols,dataRows,n){
  document.getElementById('results').classList.remove('hidden');
  var numC=cols.filter(function(c){return c.type==='numeric';}).length;
  var txtC=cols.filter(function(c){return c.type==='text';}).length;
  var datC=cols.filter(function(c){return c.type==='date';}).length;
  var nullC=cols.filter(function(c){return c.nullPct>0;}).length;
  var clz=['blue','green','pink','purple'];
  var labels=['Total rows','Columns','With nulls','Total cells'];
  var vals=[n.toLocaleString(),cols.length,nullC,(n*cols.length).toLocaleString()];
  var subs=[fname,numC+' num · '+txtC+' text · '+datC+' date','out of '+cols.length,'dataset footprint'];
  document.getElementById('statsGrid').innerHTML=labels.map(function(l,i){return '<div class="sc '+clz[i]+'"><div class="lbl">'+l+'</div><div class="val">'+vals[i]+'</div><div class="sub">'+subs[i]+'</div></div>';}).join('');

  var issues=[];
  cols.forEach(function(c){if(c.nullPct>0)issues.push(c.nullPct+'% missing in "'+c.name+'"');});
  cols.forEach(function(c){if(c.type==='numeric'&&c.std===0)issues.push('"'+c.name+'" is a constant column');if(c.type==='text'&&c.unique===1)issues.push('"'+c.name+'" has only 1 unique value');});
  if(!issues.length)issues.push('No major issues — dataset looks clean.');

  var score=100;cols.forEach(function(c){score-=c.nullPct*0.3;});score=Math.max(0,Math.round(score));
  var sc=score>=80?{c:'#43E8A4',bg:'rgba(67,232,164,.15)',l:'Good'}:score>=60?{c:'#FFD166',bg:'rgba(255,209,102,.12)',l:'Fair'}:{c:'#FF6584',bg:'rgba(255,101,132,.12)',l:'Poor'};
  document.getElementById('scoreRing').innerHTML='<div class="ring-circle" style="color:'+sc.c+';border-color:'+sc.c+';background:'+sc.bg+'">'+score+'</div><div class="ring-info"><h3>Quality score: '+sc.l+'</h3><p>'+issues.length+' issue'+(issues.length!==1?'s':'')+' across '+cols.length+' columns. Based on completeness, variance and column health.</p></div>';

  document.getElementById('issuesBox').innerHTML='<div class="iqhdr"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#FFD166" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span>Data quality issues</span></div>'+issues.map(function(iss){return '<div class="iq"><div class="iqdot"></div>'+iss+'</div>';}).join('');

  renderCols(cols);renderCorr(cols);renderPreviewTable(G.headers,dataRows);
  var sel=document.getElementById('previewSort');
  sel.innerHTML='<option value="">No sort</option>'+G.headers.map(function(h){return '<option value="'+h+'">'+h+'</option>';}).join('');
}

function renderCols(cols){
  document.getElementById('colsGrid').innerHTML=cols.map(function(col,i){
    var p=PAL[i%PAL.length];
    var badge=col.type==='numeric'?'<span class="tbadge tn">numeric</span>':col.type==='date'?'<span class="tbadge td">date</span>':'<span class="tbadge tt">text</span>';
    var body='';
    if(col.type==='numeric'){var mxH=Math.max.apply(null,col.dist)||1;var bars=col.dist.map(function(v){return '<div class="dist-bar" style="height:'+Math.max(3,Math.round(v/mxH*100))+'%;background:'+p.bg+'"></div>';}).join('');body='<div class="dist-bars">'+bars+'</div><div class="dist-ax"><span>'+col.min.toLocaleString()+'</span><span>'+col.max.toLocaleString()+'</span></div><div class="cst"><div class="cs"><span>Mean </span><strong>'+col.mean.toLocaleString()+'</strong></div><div class="cs"><span>Median </span><strong>'+col.median.toLocaleString()+'</strong></div><div class="cs"><span>Std </span><strong>'+col.std.toLocaleString()+'</strong></div><div class="cs"><span>Range </span><strong>'+col.min+'–'+col.max+'</strong></div></div>';}
    else if(col.type==='text'){body='<div>'+col.topVals.map(function(tv){return '<div class="mbr"><span class="mbl">'+tv[0]+'</span><div class="mbt"><div class="mbf" style="width:'+tv[1]+'%;background:'+p.bar+'"></div></div><span class="mbv">'+tv[1]+'%</span></div>';}).join('')+'</div><div class="cst"><div class="cs"><span>Unique </span><strong>'+(col.unique||'?')+'</strong></div></div>';}
    else{body='<div class="cst"><div class="cs"><span>Earliest </span><strong>'+col.min+'</strong></div><div class="cs"><span>Latest </span><strong>'+col.max+'</strong></div><div class="cs"><span>Unique dates </span><strong>'+col.unique+'</strong></div></div>';}
    var nullBar=col.nullPct>0?'<div class="nr"><span class="nl">'+col.nullPct+'% missing</span><div class="nt"><div class="nf" style="width:'+col.nullPct+'%"></div></div></div>':'';
    return '<div class="cc"><div class="cc-hdr">'+badge+'<span class="cname">'+col.name+'</span></div>'+body+nullBar+'</div>';
  }).join('');
}

function filterCols(){
  var q=document.getElementById('colSearch').value.toLowerCase();
  var sort=document.getElementById('colSort').value;
  var cols=[].concat(G.cols).filter(function(c){return c.name.toLowerCase().includes(q);});
  if(sort==='nulls')cols.sort(function(a,b){return b.nullPct-a.nullPct;});else if(sort==='type')cols.sort(function(a,b){return a.type.localeCompare(b.type);});else cols.sort(function(a,b){return a.name.localeCompare(b.name);});
  renderCols(cols);
}

function pearson(a,b){var n=Math.min(a.length,b.length);if(!n)return 0;var ma=a.slice(0,n).reduce(function(s,v){return s+v;},0)/n,mb=b.slice(0,n).reduce(function(s,v){return s+v;},0)/n;var num=0,da=0,db=0;for(var i=0;i<n;i++){var ai=a[i]-ma,bi=b[i]-mb;num+=ai*bi;da+=ai*ai;db+=bi*bi;}var d=Math.sqrt(da*db);return d?parseFloat((num/d).toFixed(2)):0;}

function renderCorr(cols){
  var numCols=cols.filter(function(c){return c.type==='numeric'&&c.vals&&c.vals.length;});
  if(numCols.length<2){document.getElementById('corrGrid').innerHTML='<div class="empty-corr">Need at least 2 numeric columns for correlation analysis.</div>';return;}
  var pairs=[];for(var i=0;i<numCols.length;i++)for(var j=i+1;j<numCols.length;j++){var r=pearson(numCols[i].vals,numCols[j].vals);pairs.push({a:numCols[i].name,b:numCols[j].name,r});}
  pairs.sort(function(x,y){return Math.abs(y.r)-Math.abs(x.r);});
  document.getElementById('corrGrid').innerHTML=pairs.map(function(p){
    var abs=Math.abs(p.r);
    var info=abs>0.7?{c:'#6C63FF',bg:'rgba(108,99,255,.2)',tc:'#A8A4FF',l:'strong'}:abs>0.4?{c:'#FFD166',bg:'rgba(255,209,102,.15)',tc:'#FFD166',l:'moderate'}:{c:'#5A5878',bg:'rgba(90,88,120,.2)',tc:'#9B98B8',l:'weak'};
    return '<div class="corr-row"><span class="corr-pair">'+p.a+' × '+p.b+'</span><div class="corr-track"><div class="corr-fill" style="width:'+Math.round(abs*100)+'%;background:'+info.c+'"></div></div><span class="corr-val" style="color:'+info.tc+'">'+p.r+'</span><span class="str-badge" style="background:'+info.bg+';color:'+info.tc+'">'+info.l+'</span></div>';
  }).join('');
}

function renderPreviewTable(headers,rows){
  var show=rows.slice(0,20);
  var head='<thead><tr>'+headers.map(function(h){return '<th>'+h+'</th>';}).join('')+'</tr></thead>';
  var body='<tbody>'+show.map(function(r){return '<tr>'+headers.map(function(h,i){var v=r[i]!==undefined&&String(r[i]).trim()!==''?r[i]:'<span class="null-pill">null</span>';return '<td>'+v+'</td>';}).join('')+'</tr>';}).join('')+'</tbody>';
  document.getElementById('pvTable').innerHTML=head+body;
}

function filterRows(){var q=document.getElementById('rowSearch').value.toLowerCase();var rows=G.rawRows.filter(function(r){return r.some(function(c){return String(c).toLowerCase().includes(q);});});renderPreviewTable(G.headers,rows);}

function renderPreview(){var col=document.getElementById('previewSort').value;var rows=[].concat(G.rawRows);if(col){var ci=G.headers.indexOf(col);if(ci>=0)rows.sort(function(a,b){var av=isNaN(Number(a[ci]))?String(a[ci]):Number(a[ci]),bv=isNaN(Number(b[ci]))?String(b[ci]):Number(b[ci]);return av>bv?1:av<bv?-1:0;});}renderPreviewTable(G.headers,rows);}

function showTab(id,btn){['overview','columns','correlations','preview'].forEach(function(t){document.getElementById('tab-'+t).classList.add('hidden');});document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});document.getElementById('tab-'+id).classList.remove('hidden');btn.classList.add('on');if(id==='columns')filterCols();}

function doAsk(){if(!G.cols.length){sendPrompt('Help me understand how to analyze a dataset');return;}var summary=G.cols.map(function(c){return c.name+' ('+c.type+', '+c.nullPct+'% nulls)';}).join(', ');sendPrompt('My dataset "'+G.fname+'" has '+G.n+' rows with columns: '+summary+'. What analyses and visualizations do you recommend?');}

function doML(){if(!G.cols.length){sendPrompt('What ML models work well for tabular data?');return;}var numC=G.cols.filter(function(c){return c.type==='numeric';}).length;var txtC=G.cols.filter(function(c){return c.type==='text';}).length;sendPrompt('My dataset "'+G.fname+'" has '+G.n+' rows, '+numC+' numeric and '+txtC+' text columns. What ML models or techniques would you suggest, and what could I predict?');}
</script>
